<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <!-- iPhone / PWA 必須タグ -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="DBSDV" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#fffbf0" />

  <title>DBSDV Deck Builder</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Apple touch icons -->
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & iPhone safe-area ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      /* iPhoneのバウンススクロールをアプリらしく抑制 */
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
      background: #fffbf0;
    }

    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      /* ノッチ・ホームバー対応 */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    #root {
      min-height: 100dvh; /* dynamic viewport height for iPhone */
    }

    /* タップ時のハイライト除去 */
    button, a, select, input {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    /* iOSでinputのズームを防ぐ (font-size 16px以上) */
    input, select, textarea {
      font-size: 16px !important;
    }

    /* スクロールバー非表示 */
    ::-webkit-scrollbar { display: none; }

    /* フォーカスリング */
    :focus-visible { outline: 2px solid #f59e0b; outline-offset: 2px; }

    /* Loading */
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg,#fffbf0,#fff8e1,#f0f6ff);
      font-family: 'Noto Sans JP', sans-serif;
      flex-direction: column; gap: 12px; color: #b45309;
      font-size: 14px; font-weight: 700;
    }
    #loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(180,130,0,.2);
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span>🐉 読み込み中...</span>
  </div>
  <div id="root"></div>

  <!-- React + Babel (CDN) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- App (type="text/babel" でJSXをその場でトランスパイル) -->
  <script type="text/babel" data-type="module" src="App.jsx"></script>

  <script>
    // ローディング非表示 & Service Worker 登録
    window.addEventListener('load', () => {
      const el = document.getElementById('loading');
      if (el) setTimeout(() => el.style.display = 'none', 600);

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      }
    });
  </script>
</body>
</html>
